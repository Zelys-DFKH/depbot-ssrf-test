name: artifact-upload-probe
on: workflow_dispatch
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create test artifact
        run: |
          mkdir -p /tmp/artifact-data
          echo "test-artifact-content-$(date +%s)" > /tmp/artifact-data/data.txt
          cat /tmp/artifact-data/data.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-artifact
          path: /tmp/artifact-data/
      - name: Print env vars now populated by upload-artifact
        run: |
          echo "ACTIONS_RUNTIME_TOKEN (first 30 chars): ${ACTIONS_RUNTIME_TOKEN:0:30}..."
          echo "ACTIONS_CACHE_URL: $ACTIONS_CACHE_URL"
          echo "ACTIONS_RESULTS_URL: $ACTIONS_RESULTS_URL"
          echo "RUNNER_ENVIRONMENT: $RUNNER_ENVIRONMENT"
          # Try to use the runtime token to probe cache across repos
          if [ -n "$ACTIONS_RESULTS_URL" ]; then
            echo "=== Probe artifact API ==="
            # Try listing ALL artifacts (cross-repo attempt)
            curl -s -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" \
              -H "Accept: application/json;api-version=6.0-preview" \
              "${ACTIONS_RESULTS_URL}twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
              -d '{}' | head -200
          fi
