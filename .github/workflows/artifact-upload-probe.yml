name: artifact-upload-probe

on:
  workflow_dispatch:
  push:
    branches: [main, cache-poison-test]

permissions:
  id-token: write
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run probe
        run: node probe-action/index.js
