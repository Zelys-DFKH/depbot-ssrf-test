name: artifact-upload-probe
on: workflow_dispatch
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Upload artifact to populate env vars
        uses: actions/upload-artifact@v4
        with:
          name: probe-artifact-2
          path: /etc/hostname
      
      - name: Extract env vars via Node.js (may have different env from bash)
        run: |
          node -e "
          const env = process.env;
          const keys = ['ACTIONS_RESULTS_URL','ACTIONS_RUNTIME_TOKEN','ACTIONS_CACHE_URL','ACTIONS_ID_TOKEN_REQUEST_URL'];
          keys.forEach(k => {
            const v = env[k];
            if (v) console.log(k + ': ' + v.substring(0, 80));
            else console.log(k + ': (empty)');
          });
          // Also print any env vars with 'action' in the key
          Object.keys(env).filter(k => k.toLowerCase().includes('action')).forEach(k => {
            const v = env[k];
            if (v && !v.includes('***')) console.log('FOUND: ' + k + '=' + v.substring(0,80));
          });
          "

      - name: Probe artifact service if URL found
        run: |
          # Try known artifact service URLs directly with the runtime token
          # Even if ACTIONS_RESULTS_URL is not in env, try known patterns
          
          # Pattern 1: pipelines.actions.githubusercontent.com
          echo "=== Probe pipelines service ==="
          curl -s -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" \
            -H "Accept: application/json;api-version=6.0-preview" \
            "https://pipelines.actions.githubusercontent.com/twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -d '{}' -w "\nHTTP: %{http_code}" 2>/dev/null | tail -5
          
          # Pattern 2: results-receiver.actions.githubusercontent.com
          echo "=== Probe results-receiver ==="
          curl -s -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" \
            -H "Content-Type: application/json" \
            "https://results-receiver.actions.githubusercontent.com/twirp/github.actions.results.api.v1.ArtifactService/ListArtifacts" \
            -d '{}' -w "\nHTTP: %{http_code}" 2>/dev/null | tail -5
          
          # Pattern 3: Try via GITHUB_API_URL with workflow token 
          echo "=== Probe GitHub API with workflow token (should be limited to this repo) ==="
          curl -s -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/artifacts" \
            -w "\nHTTP: %{http_code}" 2>/dev/null | head -20
          
          # Pattern 4: Try cross-repo artifact access with the GITHUB_TOKEN
          echo "=== Cross-repo artifact probe with GITHUB_TOKEN ==="
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/github/docs/actions/artifacts" \
            -w "\nHTTP: %{http_code}" 2>/dev/null | tail -5
